services:
  mysql:
    image: mysql:8
    container_name: cryptrix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: cryptrix-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5454:5454"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GEMINI_API_KEY: ${GEMINI_API_KEY}

volumes:
  mysql_data:
